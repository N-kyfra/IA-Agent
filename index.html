<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Assistant IA</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #f4f4f9; }
        #chat-box { background: white; border-radius: 10px; padding: 15px; height: 400px; overflow-y: scroll; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .message { margin: 10px 0; padding: 10px; border-radius: 8px; }
        .user { background: #007bff; color: white; text-align: right; }
        .bot { background: #e9ecef; color: black; text-align: left; }
        #input-area { display: flex; gap: 10px; }
        input, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        #user-input { flex: 1; }
        button { background: #28a745; color: white; border: none; cursor: pointer; }
        #api-key-area { margin-bottom: 20px; padding: 10px; background: #fff3cd; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <h2>🤖 Mon Assistant IA (Groq)</h2>
    
    <!-- Zone pour mettre la clé API en sécurité -->
    <div id="api-key-area">
        <label>🔑 Ta clé API Groq (ne la partage pas) :</label><br>
        <input type="password" id="api-key" placeholder="Colle ta clé gsk_... ici" style="width: 100%; margin-top: 5px;">
    </div>

    <div id="chat-box">
        <div class="message bot">Bonjour ! Je suis ton IA. Pose-moi une question !</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Écris ton message...">
        <button onclick="sendMessage()">Envoyer</button>
    </div>

    <script>
        let messages = [{ role: "system", content: "Tu es un assistant IA très utile et sympathique." }];

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const apiKey = document.getElementById("api-key").value;
            const chatBox = document.getElementById("chat-box");
            const userText = inputField.value.trim();

            if (!userText) return;
            if (!apiKey) { alert("⚠️ N'oublie pas de mettre ta clé API Groq en haut !"); return; }

            // Afficher le message de l'utilisateur
            chatBox.innerHTML += `<div class="message user">${userText}</div>`;
            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // Ajouter à l'historique
            messages.push({ role: "user", content: userText });

            // Afficher "En train d'écrire..."
            const loadingId = "loading-" + Date.now();
            chatBox.innerHTML += `<div class="message bot" id="${loadingId}">⏳ Réflexion...</div>`;

            try {
                // Appel à l'API de Groq
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: messages
                    })
                });

                const data = await response.json();
                const botReply = data.choices[0].message.content;

                // Mettre à jour l'affichage
                document.getElementById(loadingId).innerText = botReply;
                messages.push({ role: "assistant", content: botReply });

            } catch (error) {
                document.getElementById(loadingId).innerText = "❌ Erreur : " + error.message;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Permettre d'envoyer avec la touche Entrée
        document.getElementById("user-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
